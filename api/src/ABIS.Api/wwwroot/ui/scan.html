<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ABIS Scan</title>
<style>
  :root { --bd:#d0d7de; --bg:#f6f8fa; --ac:#0969da; }
  * { box-sizing: border-box; }
  body { font: 14px/1.5 system-ui, sans-serif; margin: 0; color: #1f2328; }
  body.busy { cursor: progress; }
  body.busy button { opacity:.6; pointer-events:none; }
  header { background:#24292f; color:#fff; padding:10px 16px; display:flex; gap:16px; align-items:center; flex-wrap:wrap; }
  header h1 { font-size:16px; margin:0; font-weight:600; }
  header nav { display:flex; gap:12px; flex-wrap:wrap; }
  header nav a { color:#9ecbff; text-decoration:none; }
  header .key { margin-left:auto; display:flex; gap:6px; align-items:center; }
  main { max-width:1100px; margin:0 auto; padding:16px; display:grid; gap:16px; grid-template-columns:1fr; }
  section { border:1px solid var(--bd); border-radius:8px; padding:14px; }
  h2 { font-size:14px; margin:0 0 10px; text-transform:uppercase; letter-spacing:.04em; color:#57606a; }
  label { font-size:12px; color:#57606a; }
  input, select, button { font:inherit; padding:6px 8px; border:1px solid var(--bd); border-radius:6px; }
  button { background:var(--ac); color:#fff; border-color:var(--ac); cursor:pointer; }
  table { width:100%; border-collapse:collapse; margin-top:8px; }
  th, td { text-align:left; padding:5px 6px; border-bottom:1px solid var(--bd); font-size:13px; }
  th { color:#57606a; font-weight:600; }
  .row { display:flex; gap:8px; flex-wrap:wrap; align-items:end; }
  .muted { color:#8b949e; }
  .pill { background:var(--bg); border:1px solid var(--bd); border-radius:12px; padding:1px 8px; font-size:12px; }
  .err { color:#cf222e; min-height:18px; }
  .ok { color:#1a7f37; min-height:18px; font-size:13px; }
</style>
</head>
<body>
<header>
  <h1>ABIS Scan <span class="pill">greenfield · typed client</span></h1>
  <nav>
    <a href="/ui/order-entry.html">Order entry</a>
    <a href="/ui/jobs.html">Jobs</a>
    <a href="/ui/skids.html">Skids</a>
    <a href="/ui/warehouse.html">Warehouse</a>
    <a href="/ui/coil-inventory.html">Coil inventory</a>
    <a href="/ui/qa-results.html">QA results</a>
    <a href="/ui/shipping.html">Shipping</a>
    <a href="/ui/edi.html">EDI</a>
    <a href="/ui/receiving.html">Receiving</a>
    <a href="/ui/customers.html">Customers</a>
    <a href="/ui/parts.html">Parts</a>
    <a href="/ui/carriers.html">Carriers</a>
    <a href="/ui/scan.html">Scan</a>
    <a href="/ui/sketches.html">Sketches</a>
    <a href="/ui/shifts.html">Shifts</a>
    <a href="/ui/maintenance.html">Maintenance</a>
    <a href="/ui/dies.html">Dies</a>
    <a href="/ui/downtime.html">Downtime</a>
  </nav>
  <div class="key">
    <label for="apiKey" style="color:#fff">X-Api-Key</label>
    <input id="apiKey" placeholder="dev-local-key" style="width:160px" />
  </div>
</header>

<main>
  <section>
    <h2>Record a scan</h2>
    <form id="scanForm" class="row">
      <div><label>Job # *</label><br /><input id="sJob" type="number" placeholder="ab_job_num" style="width:130px" /></div>
      <div><label>Station *</label><br /><input id="sStation" maxlength="16" placeholder="e.g. SLIT-110" style="width:140px" /></div>
      <div style="flex:1; min-width:220px"><label>Note *</label><br /><input id="sNote" maxlength="128" placeholder="scanned value / note" style="width:100%" /></div>
      <button type="submit">Record</button>
      <span id="ok" class="ok"></span>
    </form>
  </section>

  <section>
    <h2>Recent scans</h2>
    <form id="searchForm" class="row">
      <div><label>Filter by job #</label><br /><input id="fJob" type="number" placeholder="ab_job_num" style="width:130px" /></div>
      <button type="submit">Search</button>
      <span id="count" class="muted"></span>
    </form>
    <table>
      <thead><tr><th>Scan #</th><th>When</th><th>Job #</th><th>Station</th><th>Note</th></tr></thead>
      <tbody id="scans"></tbody>
    </table>
  </section>

  <section><div id="err" class="err"></div></section>
</main>

<script type="module" src="/ui/app/scan.js"></script>
</body>
</html>
