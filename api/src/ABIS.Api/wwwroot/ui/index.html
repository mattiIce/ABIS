<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ABIS Order Entry (Path C demo)</title>
<style>
  :root { --bd:#d0d7de; --bg:#f6f8fa; --ac:#0969da; }
  * { box-sizing: border-box; }
  body { font: 14px/1.5 system-ui, sans-serif; margin: 0; color: #1f2328; }
  header { background:#24292f; color:#fff; padding:10px 16px; display:flex; gap:16px; align-items:center; flex-wrap:wrap; }
  header h1 { font-size:16px; margin:0; font-weight:600; }
  header nav { display:flex; gap:12px; }
  header nav a { color:#9ecbff; text-decoration:none; }
  header .key { margin-left:auto; display:flex; gap:6px; align-items:center; }
  main { max-width:1000px; margin:0 auto; padding:16px; display:grid; gap:16px; grid-template-columns:1fr 1fr; }
  section { border:1px solid var(--bd); border-radius:8px; padding:14px; }
  section.wide { grid-column:1 / -1; }
  h2 { font-size:14px; margin:0 0 10px; text-transform:uppercase; letter-spacing:.04em; color:#57606a; }
  label { display:block; font-size:12px; color:#57606a; margin:6px 0 2px; }
  input, select, button { font:inherit; padding:6px 8px; border:1px solid var(--bd); border-radius:6px; }
  button { background:var(--ac); color:#fff; border-color:var(--ac); cursor:pointer; }
  button.secondary { background:#fff; color:var(--ac); }
  table { width:100%; border-collapse:collapse; margin-top:8px; }
  th, td { text-align:left; padding:5px 6px; border-bottom:1px solid var(--bd); font-size:13px; }
  th { color:#57606a; font-weight:600; }
  .row { display:flex; gap:8px; flex-wrap:wrap; align-items:end; }
  .muted { color:#8b949e; }
  .pill { background:var(--bg); border:1px solid var(--bd); border-radius:12px; padding:1px 8px; font-size:12px; }
  .err { color:#cf222e; }
  ul.orders { list-style:none; margin:0; padding:0; max-height:240px; overflow:auto; }
  ul.orders li { padding:6px; border-bottom:1px solid var(--bd); cursor:pointer; }
  ul.orders li:hover { background:var(--bg); }
</style>
</head>
<body>
<header>
  <h1>ABIS Order Entry <span class="pill">Path C demo</span></h1>
  <nav>
    <a href="/ui/index.html">Order entry</a>
    <a href="/ui/coils.html">Coil inventory</a>
    <a href="/ui/qa.html">QA results</a>
    <a href="/ui/typed.html">Typed client</a>
  </nav>
  <div class="key">
    <label for="apiKey" style="color:#fff;margin:0">X-Api-Key</label>
    <input id="apiKey" placeholder="dev-local-key" style="width:180px" />
  </div>
</header>

<main>
  <section>
    <h2>Find orders</h2>
    <div class="row">
      <div><label>Customer id</label><input id="fCust" type="number" style="width:120px" /></div>
      <div><label>PO contains</label><input id="fPo" style="width:140px" /></div>
      <button id="btnSearch">Search</button>
    </div>
    <ul class="orders" id="orderList"></ul>
    <div id="searchMsg" class="muted"></div>
  </section>

  <section>
    <h2>Order detail</h2>
    <div id="detail" class="muted">Select an order to view its header, customer, and lines.</div>
  </section>

  <section class="wide">
    <h2>New order</h2>
    <div class="row">
      <div><label>Customer id</label><input id="nCust" type="number" value="4001" style="width:120px" /></div>
      <div><label>Customer PO</label><input id="nPo" value="PO-DEMO-1" style="width:160px" /></div>
      <div><label>End-user PO</label><input id="nEpo" style="width:160px" /></div>
    </div>
    <table id="itemsTbl">
      <thead><tr><th>Part #</th><th>Alloy</th><th>Temper</th><th>Pieces</th><th>Unit price</th><th></th></tr></thead>
      <tbody></tbody>
    </table>
    <div class="row" style="margin-top:8px">
      <button class="secondary" id="btnAddRow">+ Add line</button>
      <button id="btnSave">Save order</button>
      <span id="saveMsg"></span>
    </div>
  </section>
</main>

<script>
const $ = s => document.querySelector(s);
const keyInput = $("#apiKey");
keyInput.value = localStorage.getItem("abis_api_key") || "dev-local-key";
keyInput.addEventListener("change", () => localStorage.setItem("abis_api_key", keyInput.value));

let alloys = [];

async function api(path, opts = {}) {
  const res = await fetch(path, {
    ...opts,
    headers: { "Content-Type": "application/json", "X-Api-Key": keyInput.value, ...(opts.headers || {}) }
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.status === 204 ? null : res.json();
}

function alloyOptions(selected) {
  return ['<option value="">—</option>']
    .concat(alloys.map(a => `<option ${a === selected ? "selected" : ""}>${a}</option>`)).join("");
}

function addRow(item = {}) {
  const tr = document.createElement("tr");
  tr.innerHTML = `
    <td><input class="i-part" value="${item.enduserPartNum || ""}" style="width:120px" /></td>
    <td><select class="i-alloy">${alloyOptions(item.alloy2)}</select></td>
    <td><input class="i-temper" value="${item.temper || ""}" style="width:70px" /></td>
    <td><input class="i-pieces" type="number" value="${item.piecesSkid || ""}" style="width:80px" /></td>
    <td><input class="i-price" type="number" step="0.01" value="${item.unitPrice || ""}" style="width:90px" /></td>
    <td><button class="secondary i-del">✕</button></td>`;
  tr.querySelector(".i-del").onclick = () => tr.remove();
  $("#itemsTbl tbody").appendChild(tr);
}

function collectItems() {
  return [...document.querySelectorAll("#itemsTbl tbody tr")].map(tr => ({
    enduserPartNum: tr.querySelector(".i-part").value.trim(),
    alloy2: tr.querySelector(".i-alloy").value || null,
    temper: tr.querySelector(".i-temper").value || null,
    piecesSkid: tr.querySelector(".i-pieces").value ? Number(tr.querySelector(".i-pieces").value) : null,
    unitPrice: tr.querySelector(".i-price").value ? Number(tr.querySelector(".i-price").value) : null
  })).filter(i => i.enduserPartNum);
}

async function search() {
  const params = new URLSearchParams();
  if ($("#fCust").value) params.set("customerId", $("#fCust").value);
  if ($("#fPo").value) params.set("po", $("#fPo").value);
  $("#searchMsg").textContent = "Loading…";
  try {
    const page = await api(`/api/orders?${params}`);
    const ul = $("#orderList"); ul.innerHTML = "";
    for (const o of page.items) {
      const li = document.createElement("li");
      li.textContent = `#${o.orderAbcNum} · cust ${o.origCustomerId ?? "—"} · PO ${o.origCustomerPo ?? "—"}`;
      li.onclick = () => loadDetail(o.orderAbcNum);
      ul.appendChild(li);
    }
    $("#searchMsg").textContent = `${page.totalCount} order(s)`;
  } catch (e) { $("#searchMsg").innerHTML = `<span class="err">${e.message} — check the API key</span>`; }
}

async function loadDetail(id) {
  $("#detail").textContent = "Loading…";
  try {
    const d = await api(`/api/orders/${id}/full`);
    const rows = d.items.map(i =>
      `<tr><td>${i.orderItemNum}</td><td>${i.enduserPartNum ?? ""}</td><td>${i.alloy2 ?? ""}</td>
       <td>${i.piecesSkid ?? ""}</td><td>${i.unitPrice ?? ""}</td></tr>`).join("");
    $("#detail").innerHTML = `
      <div><b>Order #${d.order.orderAbcNum}</b> · PO ${d.order.origCustomerPo ?? "—"}</div>
      <div class="muted">Customer: ${d.customer ? d.customer.customerName : "—"} (${d.order.origCustomerId ?? "—"})</div>
      <table><thead><tr><th>Item</th><th>Part #</th><th>Alloy</th><th>Pcs</th><th>Price</th></tr></thead>
      <tbody>${rows || '<tr><td colspan="5" class="muted">no lines</td></tr>'}</tbody></table>`;
  } catch (e) { $("#detail").innerHTML = `<span class="err">${e.message}</span>`; }
}

async function save() {
  const body = {
    order: {
      origCustomerId: $("#nCust").value ? Number($("#nCust").value) : null,
      origCustomerPo: $("#nPo").value || null,
      enduserPo: $("#nEpo").value || null
    },
    items: collectItems()
  };
  $("#saveMsg").textContent = "Saving…";
  try {
    const d = await api(`/api/orders/with-items`, { method: "POST", body: JSON.stringify(body) });
    $("#saveMsg").innerHTML = `<span class="pill">Saved order #${d.order.orderAbcNum} (${d.items.length} lines)</span>`;
    loadDetail(d.order.orderAbcNum);
    search();
  } catch (e) { $("#saveMsg").innerHTML = `<span class="err">${e.message}</span>`; }
}

$("#btnSearch").onclick = search;
$("#btnAddRow").onclick = () => addRow();
$("#btnSave").onclick = save;

(async () => {
  try { alloys = await api("/api/lookups/alloys"); } catch { /* key may be unset */ }
  addRow({ enduserPartNum: "PN-DEMO-1", alloy2: alloys[0] });
  search();
})();
</script>
</body>
</html>
