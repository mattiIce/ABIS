<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ABIS Customers</title>
<style>
  :root { --bd:#d0d7de; --bg:#f6f8fa; --ac:#0969da; }
  * { box-sizing: border-box; }
  body { font: 14px/1.5 system-ui, sans-serif; margin: 0; color: #1f2328; }
  body.busy { cursor: progress; }
  body.busy button { opacity:.6; pointer-events:none; }
  header { background:#24292f; color:#fff; padding:10px 16px; display:flex; gap:16px; align-items:center; flex-wrap:wrap; }
  header h1 { font-size:16px; margin:0; font-weight:600; }
  header nav { display:flex; gap:12px; flex-wrap:wrap; }
  header nav a { color:#9ecbff; text-decoration:none; }
  header .key { margin-left:auto; display:flex; gap:6px; align-items:center; }
  main { max-width:1100px; margin:0 auto; padding:16px; display:grid; gap:16px; grid-template-columns:3fr 2fr; }
  section { border:1px solid var(--bd); border-radius:8px; padding:14px; }
  section.wide { grid-column:1 / -1; }
  h2 { font-size:14px; margin:0 0 10px; text-transform:uppercase; letter-spacing:.04em; color:#57606a; }
  label { font-size:12px; color:#57606a; }
  input, select, button { font:inherit; padding:6px 8px; border:1px solid var(--bd); border-radius:6px; }
  button { background:var(--ac); color:#fff; border-color:var(--ac); cursor:pointer; }
  button.sec { background:#fff; color:#1f2328; border-color:var(--bd); }
  table { width:100%; border-collapse:collapse; margin-top:8px; }
  th, td { text-align:left; padding:5px 6px; border-bottom:1px solid var(--bd); font-size:13px; }
  th { color:#57606a; font-weight:600; }
  .row { display:flex; gap:8px; flex-wrap:wrap; align-items:end; }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .grid .full { grid-column:1 / -1; }
  .fld label { display:block; }
  .fld input { width:100%; }
  .muted { color:#8b949e; }
  .pill { background:var(--bg); border:1px solid var(--bd); border-radius:12px; padding:1px 8px; font-size:12px; }
  .err { color:#cf222e; min-height:18px; }
  .ok { color:#1a7f37; min-height:18px; font-size:13px; }
  tbody tr.click { cursor:pointer; }
  tbody tr.click:hover { background:var(--bg); }
  .disabled { opacity:.5; pointer-events:none; }
  .twocol { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  @media (max-width:760px){ main{grid-template-columns:1fr;} .twocol{grid-template-columns:1fr;} }
</style>
</head>
<body>
<header>
  <h1>ABIS Customers <span class="pill">greenfield · typed client</span></h1>
  <nav>
    <a href="/ui/order-entry.html">Order entry</a>
    <a href="/ui/jobs.html">Jobs</a>
    <a href="/ui/skids.html">Skids</a>
    <a href="/ui/coil-inventory.html">Coil inventory</a>
    <a href="/ui/qa-results.html">QA results</a>
    <a href="/ui/shipping.html">Shipping</a>
    <a href="/ui/receiving.html">Receiving</a>
    <a href="/ui/customers.html">Customers</a>
    <a href="/ui/parts.html">Parts</a>
    <a href="/ui/carriers.html">Carriers</a>
    <a href="/ui/scan.html">Scan</a>
    <a href="/ui/sketches.html">Sketches</a>
    <a href="/ui/shifts.html">Shifts</a>
    <a href="/ui/maintenance.html">Maintenance</a>
    <a href="/ui/dies.html">Dies</a>
    <a href="/ui/downtime.html">Downtime</a>
  </nav>
  <div class="key">
    <label for="apiKey" style="color:#fff">X-Api-Key</label>
    <input id="apiKey" placeholder="dev-local-key" style="width:160px" />
  </div>
</header>

<main>
  <section>
    <h2>Customers</h2>
    <form id="searchForm" class="row">
      <div><label>Name contains</label><br /><input id="fName" placeholder="customer name…" style="width:200px" /></div>
      <button type="submit">Search</button>
      <span id="count" class="muted"></span>
    </form>
    <table>
      <thead><tr><th>Id</th><th>Name</th><th>Short</th><th>City / State</th></tr></thead>
      <tbody id="customers"></tbody>
    </table>
  </section>

  <section>
    <h2 id="formTitle">New customer</h2>
    <div class="grid">
      <div class="fld full"><label>Name *</label><input id="cName" maxlength="60" placeholder="required" /></div>
      <div class="fld"><label>Short name</label><input id="cShort" maxlength="18" /></div>
      <div class="fld"><label>Zip</label><input id="cZip" maxlength="18" /></div>
      <div class="fld"><label>City</label><input id="cCity" maxlength="18" /></div>
      <div class="fld"><label>State</label><input id="cState" maxlength="30" /></div>
    </div>
    <div class="row" style="margin-top:10px">
      <button id="btnSave" type="button">Save</button>
      <button id="btnNew" type="button" class="sec">New</button>
    </div>
    <div id="ok" class="ok"></div>
  </section>

  <section class="wide">
    <h2>Contacts <span id="contactHint" class="muted" style="text-transform:none;letter-spacing:0"></span></h2>
    <div id="contactPanel" class="twocol disabled">
      <table>
        <thead><tr><th>Name</th><th>Dept</th><th>Phone</th><th>Email</th></tr></thead>
        <tbody id="contacts"></tbody>
      </table>
      <div>
        <h2 id="contactFormTitle">New contact</h2>
        <div class="grid">
          <div class="fld"><label>Last name *</label><input id="kLast" maxlength="18" /></div>
          <div class="fld"><label>First name</label><input id="kFirst" maxlength="18" /></div>
          <div class="fld"><label>Department</label><input id="kDept" maxlength="18" /></div>
          <div class="fld"><label>Phone</label><input id="kPhone" maxlength="18" /></div>
          <div class="fld full"><label>Email</label><input id="kEmail" maxlength="50" /></div>
          <div class="fld"><label>City</label><input id="kCity" maxlength="18" /></div>
          <div class="fld"><label>State</label><input id="kState" maxlength="30" /></div>
        </div>
        <div class="row" style="margin-top:10px">
          <button id="btnContactSave" type="button">Save contact</button>
          <button id="btnContactNew" type="button" class="sec">New</button>
        </div>
      </div>
    </div>
  </section>

  <section class="wide"><div id="err" class="err"></div></section>
</main>

<script type="module" src="/ui/app/customers.js"></script>
</body>
</html>
