<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ABIS Stacker Board</title>
<style>
  :root { --bd:#d0d7de; --bg:#f6f8fa; --ac:#0969da; }
  * { box-sizing: border-box; }
  body { font: 14px/1.5 system-ui, sans-serif; margin: 0; color: #1f2328; }
  body.busy { cursor: progress; }
  body.busy button { opacity:.6; pointer-events:none; }
  header { background:#24292f; color:#fff; padding:10px 16px; display:flex; gap:16px; align-items:center; flex-wrap:wrap; }
  header h1 { font-size:16px; margin:0; font-weight:600; }
  header nav { display:flex; gap:12px; flex-wrap:wrap; }
  header nav a { color:#9ecbff; text-decoration:none; }
  header .key { margin-left:auto; display:flex; gap:6px; align-items:center; }
  main { max-width:1050px; margin:0 auto; padding:16px; display:grid; gap:16px; }
  section { border:1px solid var(--bd); border-radius:8px; padding:14px; }
  h2 { font-size:14px; margin:0 0 10px; text-transform:uppercase; letter-spacing:.04em; color:#57606a; }
  label { font-size:12px; color:#57606a; }
  input, button { font:inherit; padding:6px 8px; border:1px solid var(--bd); border-radius:6px; }
  button { background:var(--ac); color:#fff; border-color:var(--ac); cursor:pointer; }
  table { width:100%; border-collapse:collapse; margin-top:8px; }
  th, td { text-align:left; padding:5px 6px; border-bottom:1px solid var(--bd); font-size:13px; }
  th { color:#57606a; font-weight:600; }
  .row { display:flex; gap:8px; flex-wrap:wrap; align-items:end; }
  .entry { display:flex; gap:8px; flex-wrap:wrap; align-items:end; margin-top:6px; }
  .entry > div { display:flex; flex-direction:column; } .entry input { width:100px; }
  .muted { color:#8b949e; }
  .pill { background:var(--bg); border:1px solid var(--bd); border-radius:12px; padding:1px 8px; font-size:12px; }
  .err { color:#cf222e; min-height:18px; } .ok { color:#1a7f37; min-height:18px; font-size:13px; }
</style>
</head>
<body>
<header>
  <h1>ABIS Stacker Board <span class="pill">w_110_stacker · typed client</span></h1>
  <nav>
    <a href="/ui/das-console.html">DAS console</a>
    <a href="/ui/stacker.html">Stacker board</a>
    <a href="/ui/jobs.html">Jobs</a>
    <a href="/ui/downtime.html">Downtime</a>
    <a href="/ui/reporting.html">Reporting</a>
  </nav>
  <div class="key">
    <label for="apiKey" style="color:#fff">X-Api-Key</label>
    <input id="apiKey" placeholder="dev-local-key" style="width:160px" />
  </div>
</header>

<main>
  <section>
    <h2>Line board</h2>
    <form id="lineForm" class="row">
      <div><label>Line # (blank = all)</label><br /><input id="fLine" type="number" style="width:140px" /></div>
      <button type="submit">Refresh</button>
    </form>
    <table>
      <thead><tr><th>Job</th><th>Line</th><th>Status</th><th>Order</th><th>Coils</th><th>Skids</th></tr></thead>
      <tbody id="tBoard"></tbody>
    </table>
  </section>

  <section>
    <h2>Line / stacker error log</h2>
    <table>
      <thead><tr><th>Time</th><th>Type</th><th>Line</th><th>Job</th><th>Title</th><th>Comment</th><th>User</th></tr></thead>
      <tbody id="tErrors"></tbody>
    </table>
    <div class="entry">
      <div><label>Type id *</label><input id="eType" type="number" /></div>
      <div><label>User *</label><input id="eUser" maxlength="12" /></div>
      <div><label>Line</label><input id="eLine" type="number" /></div>
      <div><label>Job</label><input id="eJob" type="number" /></div>
      <div><label>Title</label><input id="eTitle" maxlength="50" /></div>
      <div style="flex:1; min-width:160px"><label>Comment</label><input id="eComment" maxlength="255" style="width:100%" /></div>
      <button id="btnErr" type="button">Log error</button>
    </div>
    <div id="ok" class="ok"></div>
  </section>

  <section><div id="err" class="err"></div></section>
</main>

<script type="module" src="/ui/app/stacker.js"></script>
</body>
</html>
