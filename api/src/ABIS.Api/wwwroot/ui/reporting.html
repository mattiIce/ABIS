<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ABIS Reporting</title>
<style>
  :root { --bd:#d0d7de; --bg:#f6f8fa; --ac:#0969da; }
  * { box-sizing: border-box; }
  body { font: 14px/1.5 system-ui, sans-serif; margin: 0; color: #1f2328; }
  body.busy { cursor: progress; }
  body.busy button { opacity:.6; pointer-events:none; }
  header { background:#24292f; color:#fff; padding:10px 16px; display:flex; gap:16px; align-items:center; flex-wrap:wrap; }
  header h1 { font-size:16px; margin:0; font-weight:600; }
  header nav { display:flex; gap:12px; flex-wrap:wrap; }
  header nav a { color:#9ecbff; text-decoration:none; }
  header .key { margin-left:auto; display:flex; gap:6px; align-items:center; }
  main { max-width:950px; margin:0 auto; padding:16px; display:grid; gap:16px; }
  section { border:1px solid var(--bd); border-radius:8px; padding:14px; }
  h2 { font-size:14px; margin:0 0 10px; text-transform:uppercase; letter-spacing:.04em; color:#57606a; }
  label { font-size:12px; color:#57606a; }
  input, button { font:inherit; padding:6px 8px; border:1px solid var(--bd); border-radius:6px; }
  button { background:var(--ac); color:#fff; border-color:var(--ac); cursor:pointer; }
  table { width:100%; border-collapse:collapse; margin-top:8px; }
  th, td { text-align:left; padding:6px; border-bottom:1px solid var(--bd); font-size:13px; }
  th { color:#57606a; font-weight:600; }
  .row { display:flex; gap:8px; flex-wrap:wrap; align-items:end; }
  .muted { color:#8b949e; }
  .pill { background:var(--bg); border:1px solid var(--bd); border-radius:12px; padding:1px 8px; font-size:12px; }
  .err { color:#cf222e; min-height:18px; }
  .totals { margin-top:8px; font-weight:600; }
</style>
</head>
<body>
<header>
  <h1>ABIS Reporting <span class="pill">production · daily</span></h1>
  <nav>
    <a href="/ui/order-entry.html">Order entry</a>
    <a href="/ui/jobs.html">Jobs</a>
    <a href="/ui/das-console.html">DAS console</a>
    <a href="/ui/reporting.html">Reporting</a>
    <a href="/ui/accounting.html">Accounting</a>
    <a href="/ui/quotation.html">Quotation</a>
    <a href="/ui/warehouse.html">Warehouse</a>
    <a href="/ui/coil-inventory.html">Coil inventory</a>
    <a href="/ui/shipping.html">Shipping</a>
    <a href="/ui/downtime.html">Downtime</a>
    <a href="/ui/opc-log.html">OPC Log</a>
    <a href="/ui/maintenance.html">Maintenance</a>
  </nav>
  <div class="key">
    <label for="apiKey" style="color:#fff">X-Api-Key</label>
    <input id="apiKey" placeholder="dev-local-key" style="width:160px" />
  </div>
</header>

<main>
  <section>
    <h2>Production reports</h2>
    <form id="repForm" class="row">
      <div><label>Report</label><br />
        <select id="report">
          <option value="summary">Production summary (by line)</option>
          <option value="efficiency">Line efficiency (+ downtime)</option>
          <option value="monthly">Monthly production</option>
          <option value="downtime">Downtime events</option>
          <option value="ontime">On-time delivery</option>
          <optgroup label="Customer / shipment">
            <option value="customer-shipments">Customer shipments</option>
            <option value="open-shipments">Open shipments</option>
            <option value="customer-orders">Customer orders / PO</option>
            <option value="customer-skid-count">Customer skid count</option>
          </optgroup>
        </select>
      </div>
      <div><label>From</label><br /><input id="from" type="date" /></div>
      <div><label>To</label><br /><input id="to" type="date" /></div>
      <button type="submit">Run report</button>
      <button id="btnCsv" type="button" class="sec">Export CSV</button>
    </form>
    <div class="muted totals" id="totals"></div>
    <table>
      <thead><tr id="head"></tr></thead>
      <tbody id="rows"></tbody>
    </table>
    <div id="err" class="err"></div>
    <p class="muted" id="repNote"></p>
  </section>
</main>

<script type="module" src="/ui/app/reporting.js"></script>
</body>
</html>
