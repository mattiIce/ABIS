<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ABIS Coil Inventory (Path C demo)</title>
<style>
  :root { --bd:#d0d7de; --bg:#f6f8fa; --ac:#0969da; }
  * { box-sizing: border-box; }
  body { font: 14px/1.5 system-ui, sans-serif; margin: 0; color: #1f2328; }
  header { background:#24292f; color:#fff; padding:10px 16px; display:flex; gap:16px; align-items:center; flex-wrap:wrap; }
  header h1 { font-size:16px; margin:0; font-weight:600; }
  header nav { display:flex; gap:12px; }
  header nav a { color:#9ecbff; text-decoration:none; }
  header .key { margin-left:auto; display:flex; gap:6px; align-items:center; }
  main { max-width:1100px; margin:0 auto; padding:16px; display:grid; gap:16px; grid-template-columns:1fr 1fr; }
  section { border:1px solid var(--bd); border-radius:8px; padding:14px; }
  section.wide { grid-column:1 / -1; }
  h2 { font-size:14px; margin:0 0 10px; text-transform:uppercase; letter-spacing:.04em; color:#57606a; }
  label { display:block; font-size:12px; color:#57606a; margin:6px 0 2px; }
  input, select, button { font:inherit; padding:6px 8px; border:1px solid var(--bd); border-radius:6px; }
  button { background:var(--ac); color:#fff; border-color:var(--ac); cursor:pointer; }
  button.secondary { background:#fff; color:var(--ac); }
  table { width:100%; border-collapse:collapse; margin-top:8px; }
  th, td { text-align:left; padding:5px 6px; border-bottom:1px solid var(--bd); font-size:13px; }
  th { color:#57606a; font-weight:600; }
  td.num, th.num { text-align:right; }
  .row { display:flex; gap:8px; flex-wrap:wrap; align-items:end; }
  .muted { color:#8b949e; }
  .pill { background:var(--bg); border:1px solid var(--bd); border-radius:12px; padding:1px 8px; font-size:12px; }
  .err { color:#cf222e; }
  tbody tr.click { cursor:pointer; }
  tbody tr.click:hover { background:var(--bg); }
</style>
</head>
<body>
<header>
  <h1>ABIS Coil Inventory <span class="pill">Path C demo</span></h1>
  <nav>
    <a href="/ui/index.html">Order entry</a>
    <a href="/ui/coils.html">Coil inventory</a>
  </nav>
  <div class="key">
    <label for="apiKey" style="color:#fff;margin:0">X-Api-Key</label>
    <input id="apiKey" placeholder="dev-local-key" style="width:180px" />
  </div>
</header>

<main>
  <section class="wide">
    <h2>Find coils</h2>
    <div class="row">
      <div><label>Alloy</label><select id="fAlloy"></select></div>
      <div><label>Location contains</label><input id="fLoc" style="width:140px" /></div>
      <div><label>Status</label><input id="fStatus" type="number" style="width:90px" /></div>
      <button id="btnSearch">Search</button>
      <span id="searchMsg" class="muted"></span>
    </div>
    <table id="coilTbl">
      <thead><tr><th>Coil</th><th>Alloy</th><th>Temper</th><th class="num">Gauge</th><th class="num">Width</th>
        <th>Location</th><th class="num">Net wt</th><th class="num">Balance</th><th>Status</th></tr></thead>
      <tbody></tbody>
    </table>
  </section>

  <section>
    <h2>Coil detail &amp; processing</h2>
    <div id="detail" class="muted">Select a coil to view it and its processing history.</div>
  </section>

  <section>
    <h2>Receive coil</h2>
    <div class="row">
      <div><label>Alloy</label><input id="rAlloy" value="6061" style="width:90px" /></div>
      <div><label>Temper</label><input id="rTemper" value="T6" style="width:80px" /></div>
      <div><label>Gauge</label><input id="rGauge" type="number" step="0.001" value="0.125" style="width:90px" /></div>
      <div><label>Width</label><input id="rWidth" type="number" step="0.1" value="48.5" style="width:90px" /></div>
    </div>
    <div class="row">
      <div><label>Location</label><input id="rLoc" value="A-03" style="width:90px" /></div>
      <div><label>Net wt</label><input id="rNet" type="number" value="13000" style="width:110px" /></div>
      <button id="btnReceive">Receive</button>
      <span id="recvMsg"></span>
    </div>
  </section>

  <section class="wide">
    <h2>Inventory summary</h2>
    <div class="row">
      <label style="margin:0">Group by</label>
      <select id="sGroup"><option value="alloy">Alloy</option><option value="location">Location</option></select>
      <button class="secondary" id="btnSummary">Refresh</button>
    </div>
    <table id="sumTbl">
      <thead><tr><th>Key</th><th class="num">Coils</th><th class="num">Total net wt</th><th class="num">Total balance</th></tr></thead>
      <tbody></tbody>
    </table>
  </section>
</main>

<script>
const $ = s => document.querySelector(s);
const keyInput = $("#apiKey");
keyInput.value = localStorage.getItem("abis_api_key") || "dev-local-key";
keyInput.addEventListener("change", () => localStorage.setItem("abis_api_key", keyInput.value));

async function api(path, opts = {}) {
  const res = await fetch(path, {
    ...opts,
    headers: { "Content-Type": "application/json", "X-Api-Key": keyInput.value, ...(opts.headers || {}) }
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.status === 204 ? null : res.json();
}
const n = v => (v ?? "") === "" ? "" : Number(v).toLocaleString();

async function loadAlloys() {
  try {
    const alloys = await api("/api/lookups/alloys");
    $("#fAlloy").innerHTML = '<option value="">(any)</option>' + alloys.map(a => `<option>${a}</option>`).join("");
  } catch { /* key may be unset */ }
}

async function search() {
  const p = new URLSearchParams();
  if ($("#fAlloy").value) p.set("alloy", $("#fAlloy").value);
  if ($("#fLoc").value) p.set("location", $("#fLoc").value);
  if ($("#fStatus").value) p.set("status", $("#fStatus").value);
  $("#searchMsg").textContent = "Loading…";
  try {
    const page = await api(`/api/coils?${p}`);
    $("#coilTbl tbody").innerHTML = page.items.map(c => `
      <tr class="click" data-id="${c.coilAbcNum}">
        <td>${c.coilAbcNum}</td><td>${c.coilAlloy2 ?? ""}</td><td>${c.coilTemper ?? ""}</td>
        <td class="num">${c.coilGauge ?? ""}</td><td class="num">${c.coilWidth ?? ""}</td>
        <td>${c.coilLocation ?? ""}</td><td class="num">${n(c.netWt)}</td><td class="num">${n(c.netWtBalance)}</td>
        <td>${c.coilStatus ?? ""}</td></tr>`).join("");
    document.querySelectorAll("#coilTbl tbody tr").forEach(tr => tr.onclick = () => loadDetail(tr.dataset.id));
    $("#searchMsg").textContent = `${page.totalCount} coil(s)`;
  } catch (e) { $("#searchMsg").innerHTML = `<span class="err">${e.message} — check the API key</span>`; }
}

async function loadDetail(id) {
  $("#detail").textContent = "Loading…";
  try {
    const [c, proc] = await Promise.all([api(`/api/coils/${id}`), api(`/api/coils/${id}/processing`)]);
    const rows = proc.map(p => `<tr><td>${p.abJobNum}</td><td>${p.jobLineNum ?? ""}</td>
      <td>${(p.processDate || "").slice(0,10)}</td><td class="num">${n(p.processEndWt)}</td>
      <td class="num">${n(p.processQuantity)}</td></tr>`).join("");
    $("#detail").innerHTML = `
      <div><b>Coil ${c.coilAbcNum}</b> · ${c.coilAlloy2 ?? ""} ${c.coilTemper ?? ""} · ${c.coilLocation ?? ""}</div>
      <div class="muted">net ${n(c.netWt)} / bal ${n(c.netWtBalance)} · status ${c.coilStatus ?? ""}</div>
      <table><thead><tr><th>Job</th><th>Line</th><th>Date</th><th class="num">End wt</th><th class="num">Qty</th></tr></thead>
      <tbody>${rows || '<tr><td colspan="5" class="muted">not yet processed</td></tr>'}</tbody></table>`;
  } catch (e) { $("#detail").innerHTML = `<span class="err">${e.message}</span>`; }
}

async function receive() {
  const body = {
    coilAlloy2: $("#rAlloy").value || null, coilTemper: $("#rTemper").value || null,
    coilGauge: $("#rGauge").value ? Number($("#rGauge").value) : null,
    coilWidth: $("#rWidth").value ? Number($("#rWidth").value) : null,
    coilLocation: $("#rLoc").value || null,
    netWt: $("#rNet").value ? Number($("#rNet").value) : null,
    netWtBalance: $("#rNet").value ? Number($("#rNet").value) : null,
    coilStatus: 1
  };
  $("#recvMsg").textContent = "Saving…";
  try {
    const c = await api("/api/coils", { method: "POST", body: JSON.stringify(body) });
    $("#recvMsg").innerHTML = `<span class="pill">Received coil ${c.coilAbcNum}</span>`;
    search(); loadSummary();
  } catch (e) { $("#recvMsg").innerHTML = `<span class="err">${e.message}</span>`; }
}

async function loadSummary() {
  try {
    const groups = await api(`/api/coils/summary?groupBy=${$("#sGroup").value}`);
    $("#sumTbl tbody").innerHTML = groups.map(g => `<tr><td>${g.key ?? "(none)"}</td>
      <td class="num">${g.count}</td><td class="num">${n(g.totalNetWt)}</td><td class="num">${n(g.totalBalance)}</td></tr>`).join("");
  } catch (e) { $("#sumTbl tbody").innerHTML = `<tr><td colspan="4" class="err">${e.message}</td></tr>`; }
}

$("#btnSearch").onclick = search;
$("#btnReceive").onclick = receive;
$("#btnSummary").onclick = loadSummary;

(async () => { await loadAlloys(); search(); loadSummary(); })();
</script>
</body>
</html>
