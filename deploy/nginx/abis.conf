# ABIS reverse proxy (HTTP). Rendered by install.sh — do not hand-edit; re-run
# install.sh to regenerate. Placeholders @SERVER_NAME@ / @PORT@ are substituted
# at install time.
#
# With TLS mode 'letsencrypt', `certbot --nginx` edits THIS file in place to add
# the HTTPS server block, the certificate directives, and an HTTP->HTTPS
# redirect. With mode 'none' it stays HTTP-only.

upstream abis_backend {
    server 127.0.0.1:@PORT@;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name @SERVER_NAME@;

    # ACME HTTP-01 challenge path (certbot --nginx manages this automatically;
    # kept explicit so a webroot renewal also works).
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # API payload ceiling (orders/imports). Raise if you POST larger bodies.
    client_max_body_size 25m;

    location / {
        proxy_pass http://abis_backend;
        proxy_http_version 1.1;
        # The app trusts these (UseForwardedHeaders, ForwardLimit=1). nginx
        # OVERWRITES X-Forwarded-Proto and APPENDS the real client IP to
        # X-Forwarded-For, so a client cannot spoof either past this hop.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Connection        "";
        proxy_read_timeout 120s;
    }
}
