# ABIS reverse proxy (HTTPS, admin-provided certificate). Rendered by install.sh
# for TLS mode 'provided' — do not hand-edit; re-run install.sh to regenerate.
# Placeholders @SERVER_NAME@ / @PORT@ / @TLS_CERT@ / @TLS_KEY@ are substituted at
# install time. Use this mode for an internal CA or a wildcard/DNS-01 cert where
# Let's Encrypt HTTP-01 isn't appropriate.

upstream abis_backend {
    server 127.0.0.1:@PORT@;
    keepalive 16;
}

# Redirect all plaintext to HTTPS (and keep the ACME path open for future moves).
server {
    listen 80;
    listen [::]:80;
    server_name @SERVER_NAME@;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    # 'ssl http2' on the listen line is the form accepted across the nginx
    # versions Ubuntu LTS ships (1.18 → 1.27); newer nginx warns but still tests OK.
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name @SERVER_NAME@;

    ssl_certificate     @TLS_CERT@;
    ssl_certificate_key @TLS_KEY@;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS: browsers force HTTPS for a year. Safe once HTTPS is permanent for
    # this host; drop the line if you still serve anything over plain HTTP.
    add_header Strict-Transport-Security "max-age=31536000" always;

    client_max_body_size 25m;

    location / {
        proxy_pass http://abis_backend;
        proxy_http_version 1.1;
        # nginx overwrites X-Forwarded-Proto and appends the real client IP to
        # X-Forwarded-For; the app trusts exactly this one hop (ForwardLimit=1).
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Connection        "";
        proxy_read_timeout 120s;
    }
}
