# ABIS reverse proxy — TLS-pending fallback. Rendered by install.sh ONLY when
# certbot could not obtain a Let's Encrypt certificate. It deliberately does NOT
# proxy the app over cleartext: it serves just the ACME HTTP-01 challenge path
# and returns 503 for everything else, so the API key and traffic are never
# exposed in plaintext. Re-run install.sh once DNS/firewall are fixed to obtain
# the certificate and switch to the real HTTPS site.

server {
    listen 80;
    listen [::]:80;
    server_name @SERVER_NAME@;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    location / {
        return 503;
    }
}
