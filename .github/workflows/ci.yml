name: CI

on:
  push:
    branches: [ main, "claude/**" ]
  pull_request:

jobs:
  api:
    name: API build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: dotnet restore ABIS.Api.sln
      - name: Build
        run: dotnet build ABIS.Api.sln -c Release --no-restore
      - name: Test
        run: dotnet test ABIS.Api.sln -c Release --no-build --verbosity normal
      - name: Restore local tools
        run: dotnet tool restore
      - name: Generate OpenAPI contract
        run: dotnet tool run swagger tofile --output openapi.json src/ABIS.Api/bin/Release/net8.0/ABIS.Api.dll v1
      - name: Upload OpenAPI contract
        uses: actions/upload-artifact@v4
        with:
          name: openapi
          path: api/openapi.json
      - name: Generate TypeScript client (proves the contract is codegen-ready)
        run: dotnet tool run nswag openapi2tsclient /input:openapi.json /output:abis-client.ts /template:Fetch /className:AbisClient
      - name: Upload TypeScript client
        uses: actions/upload-artifact@v4
        with:
          name: ts-client
          path: api/abis-client.ts
      # Compile the typed demo (clientapp) against the freshly generated client,
      # proving the contract still produces a client that builds with the UI code.
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Build typed client demo
        run: |
          npm --prefix clientapp ci
          npm --prefix clientapp run gen
          npm --prefix clientapp run build
      - name: e2e — generated client against a live API
        env:
          ASPNETCORE_ENVIRONMENT: Development
          Database__Provider: Sqlite
          Database__ConnectionString: "Data Source=/tmp/abis_e2e.db"
          Database__Seed: "true"
          ApiKeys__Enabled: "true"
          ApiKeys__Keys__0: "ci-e2e-key"
          ASPNETCORE_URLS: "http://127.0.0.1:5225"
        run: |
          dotnet run --project src/ABIS.Api -c Release --no-build &
          API_PID=$!
          for i in $(seq 1 30); do curl -sf http://127.0.0.1:5225/health >/dev/null && break || sleep 1; done
          set +e
          ABIS_BASE=http://127.0.0.1:5225 ABIS_KEY=ci-e2e-key node clientapp/e2e/run.mjs
          STATUS=$?
          set -e
          kill $API_PID || true
          exit $STATUS

  analysis:
    name: Discovery extractors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run schema extractor
        run: python3 tools/extract_schema.py .
      - name: Run inventory extractor
        run: python3 tools/extract_inventory.py .

  docker:
    name: API image build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -f api/Dockerfile -t abis-api:ci api
