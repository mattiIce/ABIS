name: CI

on:
  push:
    branches: [ main, "claude/**" ]
  pull_request:

# Cancel superseded runs for the same ref (dedupes the push + pull_request pair).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('api/**/*.csproj', 'api/Directory.Build.props', 'api/.config/dotnet-tools.json') }}
          restore-keys: nuget-${{ runner.os }}-
      - name: Restore
        run: dotnet restore ABIS.Api.sln
      - name: Build
        run: dotnet build ABIS.Api.sln -c Release --no-restore
      - name: Test
        run: dotnet test ABIS.Api.sln -c Release --no-build --verbosity normal
      - name: Restore local tools
        run: dotnet tool restore
      - name: Generate OpenAPI contract
        run: dotnet tool run swagger tofile --output openapi.json src/ABIS.Api/bin/Release/net8.0/ABIS.Api.dll v1
      - name: Verify OpenAPI matches the committed snapshot
        # Fails if the contract drifted without updating the snapshot. To accept an
        # intended change: cd api && dotnet tool run swagger tofile --output
        # openapi.snapshot.json src/ABIS.Api/bin/Release/net8.0/ABIS.Api.dll v1
        run: diff -u openapi.snapshot.json openapi.json
      - name: Upload OpenAPI contract
        uses: actions/upload-artifact@v4
        with:
          name: openapi
          path: api/openapi.json
      - name: Generate TypeScript client (proves the contract is codegen-ready)
        run: dotnet tool run nswag openapi2tsclient /input:openapi.json /output:abis-client.ts /template:Fetch /className:AbisClient
      - name: Upload TypeScript client
        uses: actions/upload-artifact@v4
        with:
          name: ts-client
          path: api/abis-client.ts
      # Second-language client: prove the contract is language-agnostic.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Generate Python client (openapi-generator)
        run: |
          curl -sSL -o /tmp/openapi-generator-cli.jar \
            https://repo1.maven.org/maven2/org/openapitools/openapi-generator-cli/7.7.0/openapi-generator-cli-7.7.0.jar
          java -jar /tmp/openapi-generator-cli.jar generate \
            -i openapi.json -g python -o python-client \
            --additional-properties=packageName=abis_client,projectName=abis-client
      - name: Upload Python client
        uses: actions/upload-artifact@v4
        with:
          name: python-client
          path: api/python-client
      # Compile the typed demo (clientapp) against the freshly generated client,
      # proving the contract still produces a client that builds with the UI code.
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: api/clientapp/package-lock.json
      - name: Build typed client demo
        run: |
          npm --prefix clientapp ci
          npm --prefix clientapp run gen
          npm --prefix clientapp run build
      - name: e2e — generated client against a live API
        env:
          ASPNETCORE_ENVIRONMENT: Development
          Database__Provider: Sqlite
          Database__ConnectionString: "Data Source=/tmp/abis_e2e.db"
          Database__Seed: "true"
          ApiKeys__Enabled: "true"
          ApiKeys__Keys__0: "ci-e2e-key"
          ASPNETCORE_URLS: "http://127.0.0.1:5225"
        run: |
          dotnet run --project src/ABIS.Api -c Release --no-build &
          API_PID=$!
          for i in $(seq 1 30); do curl -sf http://127.0.0.1:5225/health >/dev/null && break || sleep 1; done
          set +e
          ABIS_BASE=http://127.0.0.1:5225 ABIS_KEY=ci-e2e-key node clientapp/e2e/run.mjs
          STATUS=$?
          set -e
          kill $API_PID || true
          exit $STATUS

  analysis:
    name: Discovery extractors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run schema extractor
        run: python3 tools/extract_schema.py .
      - name: Run inventory extractor
        run: python3 tools/extract_inventory.py .

  oracle-smoke:
    name: Oracle connectivity smoke (gated)
    runs-on: ubuntu-latest
    # Steps run only when the ORACLE_CONNECTION_STRING secret is set (point it at a
    # NON-production Oracle the runner can reach). Otherwise this job is a no-op.
    # (No job-level working-directory: the Gate step runs before checkout, so the
    # api/ dir doesn't exist yet — the build/run steps set their own.)
    env:
      ORACLE_CS: ${{ secrets.ORACLE_CONNECTION_STRING }}
    steps:
      - name: Gate
        run: '[ -n "$ORACLE_CS" ] && echo "Oracle smoke enabled." || echo "ORACLE_CONNECTION_STRING not set — skipping."'
      - uses: actions/checkout@v4
        if: ${{ env.ORACLE_CS != '' }}
      - uses: actions/setup-dotnet@v4
        if: ${{ env.ORACLE_CS != '' }}
        with:
          dotnet-version: '8.0.x'
      - name: Build
        if: ${{ env.ORACLE_CS != '' }}
        working-directory: api
        run: dotnet build src/ABIS.Api/ABIS.Api.csproj -c Release
      - name: Readiness smoke against Oracle
        if: ${{ env.ORACLE_CS != '' }}
        working-directory: api
        env:
          Database__Provider: Oracle
          Database__Seed: "false"
          Database__ConnectionString: ${{ env.ORACLE_CS }}
          ApiKeys__Enabled: "false"
          ASPNETCORE_ENVIRONMENT: Production
          ASPNETCORE_URLS: "http://127.0.0.1:5230"
        run: |
          dotnet run --project src/ABIS.Api -c Release --no-build &
          API_PID=$!
          for i in $(seq 1 30); do curl -sf http://127.0.0.1:5230/health >/dev/null && break || sleep 2; done
          echo "readiness:"; curl -fsS http://127.0.0.1:5230/health/ready; echo
          kill $API_PID || true

  docker:
    name: API image build & smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -f api/Dockerfile -t abis-api:ci api
      - name: Smoke-test the image boots and serves
        run: |
          docker run -d --name abis -p 8080:8080 \
            -e Database__Provider=Sqlite \
            -e Database__ConnectionString="Data Source=/tmp/abis.db" \
            -e Database__Seed=true \
            abis-api:ci
          for i in $(seq 1 30); do curl -sf http://localhost:8080/health >/dev/null && break || sleep 2; done
          echo "liveness:";  curl -fsS http://localhost:8080/health;       echo
          echo "readiness:"; curl -fsS http://localhost:8080/health/ready; echo
          docker logs abis | tail -20
          docker rm -f abis
